<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JCClub · Stock</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap');
:root {
  --black:#0a0a0a;--white:#fff;--g1:#f5f5f5;--g2:#e8e8e8;--g3:#999;--g4:#555;
  --danger:#e53e3e;--success:#22c55e;--blue:#3b82f6;--r:10px;--sh:0 2px 16px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:var(--g1);color:var(--black);min-height:100vh}

/* PIN SCREEN */
#pin-screen{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:999;gap:18px;padding:32px}
.logo-big{font-size:30px;font-weight:700;color:var(--white);letter-spacing:4px}
.sub-text{font-size:12px;color:var(--g3);letter-spacing:2px;text-transform:uppercase}
.pick-label{font-size:11px;color:var(--g3);letter-spacing:1px;text-transform:uppercase;margin-top:6px}
.admin-pick{display:flex;gap:8px;width:100%;max-width:300px;justify-content:center}
.admin-chip{flex:1;padding:11px 4px;border:1.5px solid #333;border-radius:var(--r);
  background:#1a1a1a;color:var(--g3);font-family:'Jost',sans-serif;font-size:13px;
  font-weight:600;letter-spacing:.5px;cursor:pointer;transition:all .2s}
.admin-chip.sel{background:var(--white);color:var(--black);border-color:var(--white)}
#pin-input{width:100%;max-width:300px;padding:14px 20px;font-family:'Jost',sans-serif;
  font-size:18px;letter-spacing:4px;text-align:center;background:#1a1a1a;
  border:1.5px solid #333;border-radius:var(--r);color:var(--white);outline:none;transition:border-color .2s}
#pin-input:focus{border-color:#666}
#pin-input.error{border-color:var(--danger);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
#pin-error{color:#ff6b6b;font-size:12px;height:16px;text-align:center}
.pin-btn-row{width:100%;max-width:300px;display:flex;flex-direction:column;gap:10px}
.pin-btn-main{width:100%;padding:14px;background:var(--white);color:var(--black);
  border:none;border-radius:var(--r);font-family:'Jost',sans-serif;
  font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:opacity .2s}
.pin-btn-main:hover{opacity:.85}
.pin-btn-ghost{width:100%;padding:12px;background:none;color:var(--g3);
  border:1.5px solid #333;border-radius:var(--r);font-family:'Jost',sans-serif;
  font-size:13px;letter-spacing:1px;cursor:pointer;transition:all .2s}
.pin-btn-ghost:hover{border-color:#666;color:var(--white)}

/* HEADER */
header{background:var(--black);padding:14px 20px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:10}
.h-logo{font-size:18px;font-weight:700;color:var(--white);letter-spacing:3px}
.h-role{font-size:11px;padding:4px 10px;border-radius:20px;letter-spacing:1px;font-weight:600}
.h-role.admin{background:#22c55e;color:#fff}
.h-role.reseller{background:#3b82f6;color:#fff}
#lock-btn{background:none;border:1px solid #333;border-radius:6px;color:var(--g3);
  font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1px;padding:5px 10px;cursor:pointer}

/* TABS */
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--g2);
  position:sticky;top:52px;z-index:9}
.tab-btn{flex:1;padding:12px 8px;font-family:'Jost',sans-serif;font-size:13px;
  font-weight:500;letter-spacing:.5px;background:none;border:none;cursor:pointer;
  color:var(--g3);border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:var(--black);border-bottom-color:var(--black)}

/* SECTIONS */
.section{padding:18px}
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--g3);
  text-transform:uppercase;margin-bottom:14px}

/* PHOTO */
.photo-area{width:100%;aspect-ratio:4/3;border:2px dashed var(--g2);border-radius:var(--r);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;overflow:hidden;position:relative;background:var(--g1);transition:border-color .2s;
  margin-bottom:10px;cursor:pointer}
.photo-area:hover{border-color:#aaa}
.photo-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.photo-btns{display:flex;gap:8px;margin-bottom:14px}
.photo-btn{flex:1;padding:9px;border:1.5px solid var(--g2);border-radius:8px;
  background:var(--white);font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;transition:border-color .2s}
.photo-btn:hover{border-color:#999}

/* INPUTS */
.text-input{width:100%;padding:12px 14px;font-family:'Jost',sans-serif;font-size:15px;
  border:1.5px solid var(--g2);border-radius:8px;outline:none;background:var(--white);
  color:var(--black);transition:border-color .2s}
.text-input:focus{border-color:var(--black)}
.field-label{font-size:11px;font-weight:600;letter-spacing:1px;color:var(--g4);
  text-transform:uppercase;margin-bottom:8px;display:block}

/* SIZES */
.sizes-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.size-item{display:flex;flex-direction:column;align-items:center;gap:5px}
.size-label{font-size:11px;font-weight:600;letter-spacing:1px;color:var(--g4);text-transform:uppercase}
.qty-control{display:flex;flex-direction:column;align-items:center;gap:3px}
.qty-btn{width:30px;height:26px;border:1.5px solid var(--g2);border-radius:6px;
  background:var(--white);font-size:15px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none}
.qty-btn:active{background:var(--g1);transform:scale(.95)}
.qty-display{width:34px;height:34px;border:1.5px solid var(--g2);border-radius:7px;
  font-family:'Jost',sans-serif;font-size:15px;font-weight:600;text-align:center;
  outline:none;color:var(--black);background:var(--white);transition:border-color .2s}
.qty-display:focus{border-color:var(--black)}

/* BUTTONS */
.save-btn{width:100%;padding:14px;background:var(--black);color:var(--white);
  border:none;border-radius:var(--r);font-family:'Jost',sans-serif;
  font-size:14px;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:opacity .2s;margin-top:4px}
.save-btn:hover{opacity:.85}
.save-btn:disabled{opacity:.4;cursor:not-allowed}

/* OWNER PICKER + BADGE + FILTER */
.owner-pick{display:flex;gap:8px}
.owner-chip{flex:1;padding:10px 4px;border:1.5px solid var(--g2);border-radius:8px;
  background:var(--white);color:var(--g3);font-family:'Jost',sans-serif;font-size:13px;
  font-weight:600;letter-spacing:.5px;cursor:pointer;transition:all .2s}
.owner-chip.sel{background:var(--black);color:var(--white);border-color:var(--black)}
.owner-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.5px;
  padding:2px 8px;border-radius:20px;background:var(--g1);color:var(--g4);
  margin-left:6px;vertical-align:middle;text-transform:uppercase}
.owner-badge.jc{background:#e0f2fe;color:#0369a1}
.owner-badge.racket{background:#fef3c7;color:#b45309}
.filter-row{display:flex;gap:8px;margin-bottom:14px}
.filter-chip{flex:1;padding:9px 4px;border:1.5px solid var(--g2);border-radius:8px;
  background:var(--white);color:var(--g3);font-family:'Jost',sans-serif;font-size:12px;
  font-weight:600;letter-spacing:.5px;cursor:pointer;transition:all .2s}
.filter-chip.sel{background:var(--black);color:var(--white);border-color:var(--black)}

/* STOCK LIST */
.search-input{width:100%;padding:11px 14px;font-family:'Jost',sans-serif;font-size:14px;
  border:1.5px solid var(--g2);border-radius:8px;outline:none;background:var(--white);
  margin-bottom:14px;transition:border-color .2s}
.search-input:focus{border-color:#aaa}
.stock-item{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);
  margin-bottom:12px;overflow:hidden}
.stock-item-header{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer}
.stock-thumb{width:54px;height:54px;border-radius:8px;object-fit:cover;
  background:var(--g1);flex-shrink:0}
.stock-thumb-ph{width:54px;height:54px;border-radius:8px;background:var(--g1);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stock-meta{flex:1;min-width:0}
.stock-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;margin-bottom:3px}
.stock-summary{font-size:11px;color:var(--g3);line-height:1.5}
.stock-by{color:var(--g4);font-weight:600}
.stock-chevron{font-size:16px;color:var(--g3);transition:transform .2s}
.stock-item.open .stock-chevron{transform:rotate(180deg)}
.stock-sizes{display:none;padding:0 14px 14px;border-top:1px solid var(--g1);padding-top:12px}
.stock-item.open .stock-sizes{display:block}
.stock-actions{display:flex;gap:8px;margin-top:12px}
.update-btn{flex:1;padding:10px;background:var(--black);color:var(--white);
  border:none;border-radius:8px;font-family:'Jost',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
.update-btn:hover{opacity:.8}
.delete-btn{padding:10px 14px;background:none;color:var(--danger);
  border:1.5px solid #fecaca;border-radius:8px;font-family:'Jost',sans-serif;
  font-size:13px;cursor:pointer;transition:all .2s}
.delete-btn:hover{background:#fff5f5}

/* LOG LIST */
.log-item{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);
  padding:12px 14px;margin-bottom:10px;display:flex;gap:11px;align-items:flex-start}
.log-dot{width:9px;height:9px;border-radius:50%;margin-top:5px;flex-shrink:0}
.log-dot.add{background:var(--success)}
.log-dot.update{background:var(--blue)}
.log-dot.delete{background:var(--danger)}
.log-body{flex:1;min-width:0}
.log-line1{font-size:13px;margin-bottom:2px;line-height:1.4}
.log-line1 .who{font-weight:700;color:var(--black)}
.log-line1 .act{color:var(--g4)}
.log-line1 .iname{font-weight:600;color:var(--black)}
.log-details{font-size:12px;color:var(--g4);margin-bottom:2px;word-break:break-word}
.log-time{font-size:11px;color:var(--g3)}

/* SALES / SETTLEMENT */
.log-toggle{display:flex;gap:8px;margin-bottom:14px}
.log-toggle-btn{flex:1;padding:10px;border:1.5px solid var(--g2);border-radius:8px;
  background:var(--white);color:var(--g3);font-family:'Jost',sans-serif;font-size:13px;
  font-weight:600;letter-spacing:.5px;cursor:pointer;transition:all .2s}
.log-toggle-btn.active{background:var(--black);color:var(--white);border-color:var(--black)}
.month-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.month-row button{width:40px;height:40px;border:1.5px solid var(--g2);border-radius:8px;
  background:var(--white);font-size:18px;cursor:pointer;transition:border-color .2s}
.month-row button:hover{border-color:#999}
.month-label{font-size:15px;font-weight:600;letter-spacing:.5px}
.settle{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:16px;margin-bottom:16px}
.settle-line{display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:9px 0;font-size:13px;border-bottom:1px solid var(--g1)}
.settle-line .lo{font-size:11px;color:var(--g3)}
.settle-amt{font-weight:700;white-space:nowrap}
.settle-net{margin-top:12px;padding:13px;border-radius:8px;background:var(--g1);
  text-align:center;font-size:15px;font-weight:700;letter-spacing:.3px}
.settle-net.owed{background:#fff5f5;color:var(--danger)}
.settle-net.clear{background:#f0fdf4;color:#16a34a}
.settle-own{font-size:11px;color:var(--g3);text-align:center;margin-top:10px}
.sale-item{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);
  padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;
  gap:12px;align-items:center;border-left:3px solid var(--g2)}
.sale-item.cross{border-left-color:var(--danger)}
.sale-item.own{border-left-color:var(--g2)}
.sale-l{min-width:0}
.sale-title{font-size:13px;margin-bottom:2px;line-height:1.4}
.sale-title b{font-weight:700}
.sale-sub{font-size:11px;color:var(--g3)}
.sale-amt{font-size:16px;font-weight:700;white-space:nowrap;color:var(--danger)}
.sale-own-tag{font-size:11px;color:var(--g3);font-style:italic;white-space:nowrap}

.empty-state{text-align:center;padding:60px 20px;color:var(--g3)}
.empty-state .ei{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* STATUS */
#upload-status{font-size:12px;color:var(--g3);text-align:center;margin-top:4px;min-height:16px}
.db-status{font-size:11px;color:var(--g3);text-align:center;padding:6px;
  background:var(--g1);border-radius:6px;margin-bottom:12px}
.db-status.ok{color:#16a34a}
.db-status.err{color:var(--danger)}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(--black);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:998;gap:16px;transition:opacity .3s}
#loading-screen.hide{opacity:0;pointer-events:none}
.spinner-big{width:36px;height:36px;border:3px solid #333;border-top-color:var(--white);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--g3);letter-spacing:1px}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--black);color:var(--white);padding:11px 22px;border-radius:100px;
  font-size:13px;font-weight:500;letter-spacing:.5px;opacity:0;transition:all .3s;
  z-index:200;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{background:#16a34a}
#toast.error{background:var(--danger)}

input[type="file"]{display:none}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="logo-big">JCCLUB</div>
  <div class="spinner-big"></div>
  <div class="loading-text">LOADING STOCK…</div>
</div>

<!-- PIN SCREEN -->
<div id="pin-screen" style="display:none">
  <div class="logo-big">JCCLUB</div>
  <div class="sub-text">Stock Manager</div>
  <div class="pick-label">Who are you?</div>
  <div class="admin-pick" id="admin-pick"></div>
  <input type="password" id="pin-input" placeholder="Your PIN" maxlength="30"
    onkeydown="if(event.key==='Enter') checkPin()" autocomplete="off">
  <div id="pin-error"></div>
  <div class="pin-btn-row">
    <button class="pin-btn-main" onclick="checkPin()">UNLOCK AS ADMIN</button>
    <button class="pin-btn-ghost" onclick="enterAsReseller()">👀 VIEW STOCK ONLY</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <div class="h-logo">JCCLUB</div>
    <div class="h-role" id="role-badge">—</div>
    <button id="lock-btn" onclick="lockApp()">LOCK</button>
  </header>

  <div class="tabs" id="tab-bar">
    <button class="tab-btn active" id="tab-stock-btn" onclick="switchTab('stock')">📦 Stock</button>
    <button class="tab-btn" id="tab-add-btn" onclick="switchTab('add')" style="display:none">＋ Add</button>
    <button class="tab-btn" id="tab-log-btn" onclick="switchTab('log')" style="display:none">🧾 Log</button>
  </div>

  <!-- STOCK TAB -->
  <div id="tab-stock" class="section">
    <div class="db-status" id="db-status">Connecting…</div>
    <input type="text" class="search-input" id="search-input" placeholder="Search jerseys…" oninput="renderStock()">
    <div class="filter-row" id="owner-filter"></div>
    <div id="stock-list"></div>
  </div>

  <!-- ADD TAB (admin only) -->
  <div id="tab-add" class="section" style="display:none">
    <div class="card">
      <div class="card-title">Product Photo</div>
      <div class="photo-area" id="photo-area" onclick="document.getElementById('file-gallery').click()">
        <span style="font-size:32px">🖼️</span>
        <span style="font-size:13px;color:var(--g3)">Tap to choose photo</span>
      </div>
      <div class="photo-btns">
        <button class="photo-btn" onclick="document.getElementById('file-camera').click()">📷 Camera</button>
        <button class="photo-btn" onclick="document.getElementById('file-gallery').click()">🖼️ Gallery</button>
        <button class="photo-btn" id="rm-photo" style="display:none;color:var(--danger);border-color:#fecaca" onclick="removePhoto()">🗑 Remove</button>
      </div>
      <input type="file" id="file-camera" accept="image/*" capture="environment" onchange="handlePhoto(this)">
      <input type="file" id="file-gallery" accept="image/*" onchange="handlePhoto(this)">
      <div id="upload-status"></div>
    </div>

    <div class="card">
      <div class="card-title">Item Name</div>
      <input type="text" class="text-input" id="item-name" placeholder="e.g. Brazil Home Kit 2024">
    </div>

    <div class="card">
      <div class="card-title">Owner</div>
      <div class="owner-pick" id="add-owner-pick"></div>
    </div>

    <div class="card">
      <div class="card-title">Price (₹ per piece)</div>
      <input type="number" class="text-input" id="item-price" placeholder="e.g. 499" min="0" inputmode="numeric">
    </div>

    <div class="card">
      <div class="card-title">Stock by Size</div>
      <div class="sizes-grid" id="add-sizes-grid"></div>
    </div>

    <button class="save-btn" id="save-btn" onclick="saveItem()">SAVE TO STOCK</button>
  </div>

  <!-- LOG TAB (admin only) -->
  <div id="tab-log" class="section" style="display:none">
    <div class="db-status" id="log-status">Loading…</div>
    <div class="log-toggle">
      <button id="logtab-sales-btn" class="log-toggle-btn active" onclick="switchLogView('sales')">💰 Sales</button>
      <button id="logtab-activity-btn" class="log-toggle-btn" onclick="switchLogView('activity')">🧾 Activity</button>
    </div>

    <div id="logview-sales">
      <div class="month-row">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="month-label" id="month-label">—</div>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div id="settlement-box"></div>
      <div id="sales-list"></div>
    </div>

    <div id="logview-activity" style="display:none">
      <div id="activity-list"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Firebase SDK (module) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getDatabase, ref, get, set, onValue, remove, push
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
//  Each admin has their own PIN so the change-log
//  knows exactly who made every change.
//  👉 CHANGE THESE PINS to real private ones.
const ADMINS = {
  'JC':     'jc916',
  'Racket': 'racket916'
};

// Who can own a product (shown as a selector on Add/Edit).
const OWNERS = ['JC', 'Racket'];

const IMGBB_KEY = 'eefc443b08b231582bb6f78e52202294';

const firebaseConfig = {
  apiKey: "AIzaSyC2SBFe8TsvS0W_lM4C0XOqLG4u5N9W-Y8",
  authDomain: "dbspro-d50aa.firebaseapp.com",
  databaseURL: "https://dbspro-d50aa-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dbspro-d50aa",
  storageBucket: "dbspro-d50aa.firebasestorage.app",
  messagingSenderId: "733574579947",
  appId: "1:733574579947:web:58b9d1f59886368910a0ae"
};
// ═══════════════════════════════════════════════

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const SIZES     = ['S','M','L','XL','XXL'];
const ROLE_KEY  = 'jcclub_role';
const ADMIN_KEY = 'jcclub_admin';

let stock         = [];
let logs          = [];
let currentRole   = null;
let currentAdmin  = null;   // 'Nashad' | 'Salman' | 'Suhail'
let selectedAdmin = null;   // chosen chip on the PIN screen
let addOwner      = null;   // selected owner on the Add tab
let ownerFilter   = 'all';  // stock list filter: 'all' | owner name
let logView       = 'sales';// log tab sub-view: 'sales' | 'activity'
let viewMonth     = new Date(new Date().getFullYear(), new Date().getMonth(), 1); // settlement month
let currentPhoto  = null;
let liveUnsubscribe = null; // stock listener
let liveLogUnsub    = null; // log listener

// ── INIT ────────────────────────────────────────
async function init() {
  const savedRole  = localStorage.getItem(ROLE_KEY);
  const savedAdmin = localStorage.getItem(ADMIN_KEY);
  if (savedRole === 'admin' && savedAdmin && ADMINS[savedAdmin]) {
    currentRole = 'admin';
    currentAdmin = savedAdmin;
    await bootApp();
  } else if (savedRole === 'reseller') {
    currentRole = 'reseller';
    await bootApp();
  } else {
    hide('loading-screen');
    show('pin-screen');
    buildAdminChips();
  }
}

// ── ADMIN PICKER ─────────────────────────────────
function buildAdminChips() {
  const box = document.getElementById('admin-pick');
  box.innerHTML = Object.keys(ADMINS).map(n =>
    `<button class="admin-chip" data-name="${n}" onclick="pickAdmin('${n}')">${n}</button>`
  ).join('');
}

window.pickAdmin = function(name) {
  selectedAdmin = name;
  document.querySelectorAll('.admin-chip').forEach(c =>
    c.classList.toggle('sel', c.dataset.name === name));
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-input').focus();
}

// ── AUTH ─────────────────────────────────────────
window.checkPin = function() {
  const err = document.getElementById('pin-error');
  if (!selectedAdmin) {
    err.textContent = 'Tap your name first';
    setTimeout(() => err.textContent = '', 1800);
    return;
  }
  const val = document.getElementById('pin-input').value.trim();
  if (ADMINS[selectedAdmin] && ADMINS[selectedAdmin] === val) {
    localStorage.setItem(ROLE_KEY, 'admin');
    localStorage.setItem(ADMIN_KEY, selectedAdmin);
    currentRole  = 'admin';
    currentAdmin = selectedAdmin;
    document.getElementById('pin-input').value = '';
    bootApp();
  } else {
    shake();
    err.textContent = 'Wrong PIN for ' + selectedAdmin;
    document.getElementById('pin-input').value = '';
    setTimeout(() => err.textContent = '', 1800);
  }
}

window.enterAsReseller = function() {
  localStorage.setItem(ROLE_KEY, 'reseller');
  localStorage.removeItem(ADMIN_KEY);
  currentRole = 'reseller';
  currentAdmin = null;
  bootApp();
}

window.lockApp = function() {
  if (liveUnsubscribe) liveUnsubscribe();
  if (liveLogUnsub)    liveLogUnsub();
  localStorage.removeItem(ROLE_KEY);
  localStorage.removeItem(ADMIN_KEY);
  location.reload();
}

function shake() {
  const inp = document.getElementById('pin-input');
  inp.classList.add('error');
  setTimeout(() => inp.classList.remove('error'), 400);
}

// ── BOOT ─────────────────────────────────────────
async function bootApp() {
  show('loading-screen');
  hide('pin-screen');

  const badge = document.getElementById('role-badge');
  if (currentRole === 'admin') {
    badge.textContent = '⚙ ' + (currentAdmin || 'ADMIN').toUpperCase();
    badge.className = 'h-role admin';
    document.getElementById('tab-add-btn').style.display = '';
    document.getElementById('tab-log-btn').style.display = '';
  } else {
    badge.textContent = 'RESELLER';
    badge.className = 'h-role reseller';
  }

  await fetchStock();  // initial load

  document.getElementById('loading-screen').classList.add('hide');
  setTimeout(() => hide('loading-screen'), 350);
  show('app');
  buildSizesGrid('add-sizes-grid', {});

  // default the Add-tab owner to whoever is logged in (if they're an owner)
  addOwner = OWNERS.includes(currentAdmin) ? currentAdmin : OWNERS[0];
  buildAddOwnerPick();
  buildOwnerFilter();
  renderStock();

  // live updates
  subscribeStock();
  if (currentRole === 'admin') subscribeLogs();
}

// ── FIREBASE: STOCK ───────────────────────────────
async function fetchStock() {
  const status = document.getElementById('db-status');
  try {
    const snap = await get(ref(db, 'stock'));
    stock = snap.exists() ? Object.values(snap.val()) : [];
    stock.sort((a, b) => Number(b.id) - Number(a.id));
    status.textContent = `✅ ${stock.length} items loaded`;
    status.className = 'db-status ok';
  } catch(e) {
    status.textContent = '⚠️ Could not reach Firebase — check config / rules';
    status.className = 'db-status err';
    stock = [];
  }
}

function subscribeStock() {
  if (liveUnsubscribe) liveUnsubscribe();
  liveUnsubscribe = onValue(ref(db, 'stock'), snap => {
    stock = snap.exists() ? Object.values(snap.val()) : [];
    stock.sort((a, b) => Number(b.id) - Number(a.id));
    const status = document.getElementById('db-status');
    if (status) {
      status.textContent = `✅ ${stock.length} items · live`;
      status.className = 'db-status ok';
    }
    renderStock();
  }, err => {
    const status = document.getElementById('db-status');
    if (status) {
      status.textContent = '⚠️ Live sync error — check Firebase rules';
      status.className = 'db-status err';
    }
  });
}

async function pushItem(item) {
  await set(ref(db, `stock/${item.id}`), item);
}
async function removeItem(id) {
  await remove(ref(db, `stock/${id}`));
}

// ── FIREBASE: LOG ─────────────────────────────────
// All entries live under logs/ but carry a `kind`:
//   'change' → adds, deletes, restocks, price/owner edits
//   'sale'   → stock going out (a decrease). Drives money.
async function writeChange(action, item, details) {
  try {
    await push(ref(db, 'logs'), {
      kind:     'change',
      admin:    currentAdmin || currentRole || 'unknown',
      action:   action,               // 'add' | 'update' | 'delete'
      itemId:   item.id || '',
      itemName: item.name || '',
      details:  details || '',
      ts:       Date.now(),
      at:       new Date().toLocaleString('en-IN')
    });
  } catch(e) {
    console.warn('change log failed', e);
  }
}

async function writeSale(s) {
  try {
    await push(ref(db, 'logs'), {
      kind: 'sale',
      ...s,                            // seller, owner, itemId, itemName, qty, breakdown, unitPrice, amount, cross
      ts:   Date.now(),
      at:   new Date().toLocaleString('en-IN')
    });
  } catch(e) {
    console.warn('sale log failed', e);
  }
}

function subscribeLogs() {
  if (liveLogUnsub) liveLogUnsub();
  liveLogUnsub = onValue(ref(db, 'logs'), snap => {
    logs = snap.exists() ? Object.values(snap.val()) : [];
    logs.sort((a, b) => (b.ts || 0) - (a.ts || 0));
    renderLog();
  }, err => {
    const st = document.getElementById('log-status');
    if (st) { st.textContent = '⚠️ Log sync error — check rules'; st.className = 'db-status err'; }
  });
}

// ── PHOTO ─────────────────────────────────────────
window.handlePhoto = function(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    currentPhoto = { file, dataUrl: e.target.result };
    const area = document.getElementById('photo-area');
    area.innerHTML = `<img src="${e.target.result}" alt="preview">`;
    document.getElementById('rm-photo').style.display = '';
    document.getElementById('upload-status').textContent = 'Photo ready — uploads on save';
  };
  reader.readAsDataURL(file);
  input.value = '';
}

window.removePhoto = function() {
  currentPhoto = null;
  const area = document.getElementById('photo-area');
  area.innerHTML = `<span style="font-size:32px">🖼️</span><span style="font-size:13px;color:var(--g3)">Tap to choose photo</span>`;
  document.getElementById('rm-photo').style.display = 'none';
  document.getElementById('upload-status').textContent = '';
}

async function uploadImgBB(file) {
  const b64 = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
  const fd = new FormData();
  fd.append('image', b64);
  const res  = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd });
  const data = await res.json();
  if (data?.data?.url) return data.data.url;
  throw new Error(data?.error?.message || 'ImgBB failed');
}

// ── SAVE NEW ITEM ─────────────────────────────────
window.saveItem = async function() {
  if (currentRole !== 'admin') return;
  const name = document.getElementById('item-name').value.trim();
  if (!name) { toast('Enter an item name', 'error'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'SAVING…';

  try {
    let photoUrl = null;
    if (currentPhoto) {
      document.getElementById('upload-status').textContent = '⏳ Uploading photo…';
      photoUrl = await uploadImgBB(currentPhoto.file);
      document.getElementById('upload-status').textContent = '✅ Photo uploaded';
    }

    const owner = addOwner || getSelectedOwner('add-owner-pick') || OWNERS[0];
    const price = Number(document.getElementById('item-price').value) || 0;
    const item = {
      id: Date.now().toString(),
      name,
      photo: photoUrl,
      owner,
      price,
      sizes: getSizesFromGrid('add-sizes-grid'),
      updatedAt: new Date().toLocaleDateString('en-IN'),
      updatedBy: currentAdmin
    };

    await pushItem(item);
    await writeChange('add', item, `Added [owner: ${owner}, ₹${price}] — ` + nonZeroSummary(item.sizes));
    resetForm();
    toast('Item saved!', 'success');
    switchTab('stock');
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  }

  btn.disabled = false; btn.textContent = 'SAVE TO STOCK';
}

// ── SIZES GRID ────────────────────────────────────
window.buildSizesGrid = function(id, values) {
  const grid = document.getElementById(id);
  if (!grid) return;
  const isReadonly = currentRole === 'reseller';
  grid.innerHTML = SIZES.map(s => `
    <div class="size-item">

      <div class="qty-control">
        ${!isReadonly ? `<button class="qty-btn" onclick="changeQty('${id}','${s}',1)">+</button>` : ''}
        <input class="qty-display" id="qty-${id}-${s}" type="number"
          value="${values[s] ?? 0}" min="0" max="999"
          ${isReadonly ? 'readonly style="border-color:var(--g2);cursor:default;font-size:14px"' : ''}
          oninput="clampQty(this)" onblur="if(this.value==='')this.value=0">
        ${!isReadonly ? `<button class="qty-btn" onclick="changeQty('${id}','${s}',-1)">−</button>` : ''}
      </div>

window.changeQty = function(gridId, size, delta) {
  const inp = document.getElementById(`qty-${gridId}-${size}`);
  let v = parseInt(inp.value) || 0;
  inp.value = Math.max(0, Math.min(999, v + delta));
}

window.clampQty = function(inp) {
  let v = parseInt(inp.value);
  if (isNaN(v) || v < 0) inp.value = 0;
  else if (v > 999) inp.value = 999;
}

function getSizesFromGrid(gridId) {
  const out = {};
  SIZES.forEach(s => { out[s] = parseInt(document.getElementById(`qty-${gridId}-${s}`)?.value) || 0; });
  return out;
}

            ${item.updatedBy ? `<span class="stock-by">✎ ${esc(item.updatedBy)}</span> · ` : ''}${item.updatedAt || ''}</div>
        </div>

        <div style="margin-bottom:14px">
          <div class="field-label">Price (₹ per piece)</div>
          <input type="number" class="text-input" id="price-${item.id}" value="${item.price ?? ''}" min="0" inputmode="numeric" style="font-size:15px">
        </div>` : ''}

        <div class="stock-actions">

window.toggleItem = function(id) {
  document.getElementById(`si-${id}`)?.classList.toggle('open');
}

window.updateItem = async function(id) {
  if (currentRole !== 'admin') return;
  const item = stock.find(it => it.id === id);
  if (!item) return;
  const btn = document.querySelector(`#si-${id} .update-btn`);
  if (btn) { btn.disabled = true; btn.textContent = 'SAVING…'; }
  try {
    const oldSizes = { ...item.sizes };
    const oldOwner = item.owner || '';
    const oldPrice = Number(item.price) || 0;

    const newSizes = getSizesFromGrid(`eg-${id}`);
    const newOwner = getSelectedOwner(`owner-${id}`) || item.owner || null;
    const newPrice = Number(document.getElementById(`price-${id}`)?.value) || 0;

    item.sizes = newSizes;
    item.owner = newOwner;
    item.price = newPrice;
    item.updatedAt = new Date().toLocaleDateString('en-IN');
    item.updatedBy = currentAdmin;
    await pushItem(item);

    // ── SALE: any size that went DOWN counts as sold by the current admin ──
    let soldQty = 0;
    const soldParts = [];
    SIZES.forEach(s => {
      const d = (oldSizes[s] || 0) - (newSizes[s] || 0);
      if (d > 0) { soldQty += d; soldParts.push(`${s}×${d}`); }
    });
    if (soldQty > 0) {
      const seller = currentAdmin;
      const owner  = newOwner || '';
      const cross  = !!(owner && seller && owner !== seller);   // sold someone else's stock
      const unit   = newPrice;
      await writeSale({
        seller,
        owner,
        itemId:    id,
        itemName:  item.name,
        qty:       soldQty,
        breakdown: soldParts.join(', '),
        unitPrice: unit,
        amount:    cross ? soldQty * unit : 0,
        cross
      });
    }

    // ── CHANGE: restocks (size increases) + owner / price edits ──
    const restockParts = [];
    SIZES.forEach(s => {
      const inc = (newSizes[s] || 0) - (oldSizes[s] || 0);
      if (inc > 0) restockParts.push(`${s}+${inc}`);
    });
    const chgParts = [];
    if (restockParts.length) chgParts.push('restock ' + restockParts.join(', '));
    if (oldOwner !== (newOwner || '')) chgParts.push(`owner ${oldOwner || '—'}→${newOwner || '—'}`);
    if (oldPrice !== newPrice) chgParts.push(`price ₹${oldPrice}→₹${newPrice}`);
    if (chgParts.length) await writeChange('update', item, chgParts.join(' · '));

    toast(soldQty > 0 ? `Recorded: ${soldQty} sold` : 'Stock updated!', 'success');
    setTimeout(() => document.getElementById(`si-${id}`)?.classList.add('open'), 200);
  } catch(e) {
    toast('Save failed: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'UPDATE STOCK'; }
  }
}

window.deleteItem = async function(id) {
  const item = stock.find(it => it.id === id);
  if (!confirm('Delete this item?')) return;
  try {
    await removeItem(id);
    if (item) await writeChange('delete', item, `Deleted [owner: ${item.owner || '—'}] — was ` + nonZeroSummary(item.sizes));
    toast('Deleted');
  } catch(e) {
    toast('Delete failed', 'error');
  }
}

function sizeSummary(sizes) {
  return SIZES.map(s => `${s}:${sizes[s] ?? 0}`).join(' · ');
}
function nonZeroSummary(sizes) {
  const parts = SIZES.filter(s => (sizes[s] || 0) > 0).map(s => `${s}:${sizes[s]}`);
  return parts.length ? parts.join(', ') : 'all sizes 0';
}

window.changeMonth = function(delta) {
  viewMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + delta, 1);
  renderSalesView();
}

function renderSalesView() {
  const vy = viewMonth.getFullYear(), vm = viewMonth.getMonth();
  const ml = document.getElementById('month-label');
  if (ml) ml.textContent = viewMonth.toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });

  const monthSales = logs
    .filter(l => l.kind === 'sale')
    .filter(l => { const d = new Date(l.ts); return d.getFullYear() === vy && d.getMonth() === vm; })
    .sort((a, b) => (b.ts || 0) - (a.ts || 0));

  // ── settlement: cross-sales only ──
  const cross = {};                 // key `${seller}>${owner}` → {amount, qty}
  const ownQty = {};                // seller → qty
  monthSales.forEach(s => {
    if (s.cross) {
      const k = `${s.seller}>${s.owner}`;
      cross[k] = cross[k] || { amount: 0, qty: 0 };
      cross[k].amount += Number(s.amount) || 0;
      cross[k].qty    += Number(s.qty) || 0;
    } else {
      ownQty[s.seller] = (ownQty[s.seller] || 0) + (Number(s.qty) || 0);
    }
  });

  const box = document.getElementById('settlement-box');
  if (box) {
    const A = OWNERS[0], B = OWNERS[1];
    const aB = cross[`${A}>${B}`] || { amount: 0, qty: 0 };  // A sold B's stock → A owes B
    const bA = cross[`${B}>${A}`] || { amount: 0, qty: 0 };  // B sold A's stock → B owes A
    const net = aB.amount - bA.amount;
    let netHtml, netCls;
    if (net > 0)      { netHtml = `${A} owes ${B} ₹${net}`;      netCls = 'owed'; }
    else if (net < 0) { netHtml = `${B} owes ${A} ₹${-net}`;     netCls = 'owed'; }
    else              { netHtml = 'All settled · ₹0';            netCls = 'clear'; }

    const ownLine = (ownQty[A] || ownQty[B])
      ? `<div class="settle-own">Own sales — ${A}: ${ownQty[A] || 0} · ${B}: ${ownQty[B] || 0} pcs</div>` : '';

    box.innerHTML = `
      <div class="settle">
        <div class="settle-line">
          <span>${esc(A)} sold ${esc(B)}'s stock <span class="lo">${aB.qty} pcs</span></span>
          <span class="settle-amt">₹${aB.amount}</span>
        </div>
        <div class="settle-line">
          <span>${esc(B)} sold ${esc(A)}'s stock <span class="lo">${bA.qty} pcs</span></span>
          <span class="settle-amt">₹${bA.amount}</span>
        </div>
        <div class="settle-net ${netCls}">${esc(netHtml)}</div>
        ${ownLine}
      </div>`;
  }

  // ── sales list ──
  const list = document.getElementById('sales-list');
  if (list) {
    if (!monthSales.length) {
      list.innerHTML = `<div class="empty-state"><div class="ei">💰</div><p>No sales this month.</p></div>`;
    } else {
      list.innerHTML = monthSales.map(saleRow).join('');
    }
  }
}

function saleRow(s) {
  const cross = s.cross;
  const title = cross
    ? `${esc(s.seller)} sold ${esc(s.owner)}'s <b>${esc(s.itemName)}</b>`
    : `${esc(s.seller)} sold own <b>${esc(s.itemName)}</b>`;
  const right = cross
    ? `<div class="sale-amt">₹${Number(s.amount) || 0}</div>`
    : `<div class="sale-own-tag">own</div>`;
  const sub = `${esc(s.breakdown || ('×' + (s.qty || 0)))}`
    + (cross && s.unitPrice ? ` · ₹${s.unitPrice}/pc` : '')
    + ` · ${esc(s.at || '')}`;
  return `<div class="sale-item ${cross ? 'cross' : 'own'}">
    <div class="sale-l">
      <div class="sale-title">${title}</div>
      <div class="sale-sub">${sub}</div>
    </div>
    ${right}
  </div>`;
}

function renderActivity() {
  const acts = logs
    .filter(l => l.kind !== 'sale')                 // 'change' + legacy entries
    .sort((a, b) => (b.ts || 0) - (a.ts || 0))
    .slice(0, 150);
  const list = document.getElementById('activity-list');
  if (!list) return;
  if (!acts.length) {
    list.innerHTML = `<div class="empty-state"><div class="ei">🧾</div><p>No changes yet.</p></div>`;
    return;
  }
  list.innerHTML = acts.map(l => `
    <div class="log-item">
      <div class="log-dot ${l.action || ''}"></div>
      <div class="log-body">
        <div class="log-line1">
          <span class="who">${esc(l.admin || '?')}</span>
          <span class="act">${actWord(l.action)}</span>
          <span class="iname">${esc(l.itemName || '')}</span>
        </div>
        ${l.details ? `<div class="log-details">${esc(l.details)}</div>` : ''}
        <div class="log-time">${esc(l.at || '')}</div>
      </div>
    </div>`).join('');
}
function actWord(a) { return a === 'add' ? 'added' : a === 'delete' ? 'deleted' : 'updated'; }

// ── TABS ──────────────────────────────────────────
window.switchTab = function(tab) {
  ['stock','add','log'].forEach(t => {
    const sec = document.getElementById(`tab-${t}`);
    if (sec) sec.style.display = t === tab ? '' : 'none';
    document.getElementById(`tab-${t}-btn`)?.classList.toggle('active', t === tab);
  });
  if (tab === 'stock') renderStock();
  if (tab === 'log')   renderLog();
}

// ── UTILS ─────────────────────────────────────────
function show(id) { const el = document.getElementById(id); if(el) el.style.display = ''; }
function hide(id) { const el = document.getElementById(id); if(el) el.style.display = 'none'; }
function esc(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let toastTimer;
window.toast = function(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 2500);
}

init();
</script>
</body>
</html>
