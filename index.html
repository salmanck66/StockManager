<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JCClub · Stock</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap');
:root {
  --black:#0a0a0a;--white:#fff;--g1:#f5f5f5;--g2:#e8e8e8;--g3:#999;--g4:#555;
  --danger:#e53e3e;--success:#22c55e;--r:10px;--sh:0 2px 16px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:var(--g1);color:var(--black);min-height:100vh}

/* PIN SCREEN */
#pin-screen{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:999;gap:20px;padding:32px}
.logo-big{font-size:30px;font-weight:700;color:var(--white);letter-spacing:4px}
.sub-text{font-size:12px;color:var(--g3);letter-spacing:2px;text-transform:uppercase}
#pin-input{width:100%;max-width:300px;padding:14px 20px;font-family:'Jost',sans-serif;
  font-size:18px;letter-spacing:4px;text-align:center;background:#1a1a1a;
  border:1.5px solid #333;border-radius:var(--r);color:var(--white);outline:none;transition:border-color .2s}
#pin-input:focus{border-color:#666}
#pin-input.error{border-color:var(--danger);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
#pin-error{color:#ff6b6b;font-size:12px;height:16px;text-align:center}
.pin-btn-row{width:100%;max-width:300px;display:flex;flex-direction:column;gap:10px}
.pin-btn-main{width:100%;padding:14px;background:var(--white);color:var(--black);
  border:none;border-radius:var(--r);font-family:'Jost',sans-serif;
  font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:opacity .2s}
.pin-btn-main:hover{opacity:.85}
.pin-btn-ghost{width:100%;padding:12px;background:none;color:var(--g3);
  border:1.5px solid #333;border-radius:var(--r);font-family:'Jost',sans-serif;
  font-size:13px;letter-spacing:1px;cursor:pointer;transition:all .2s}
.pin-btn-ghost:hover{border-color:#666;color:var(--white)}

/* HEADER */
header{background:var(--black);padding:14px 20px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:10}
.h-logo{font-size:18px;font-weight:700;color:var(--white);letter-spacing:3px}
.h-role{font-size:11px;padding:4px 10px;border-radius:20px;letter-spacing:1px;font-weight:600}
.h-role.admin{background:#22c55e;color:#fff}
.h-role.reseller{background:#3b82f6;color:#fff}
#lock-btn{background:none;border:1px solid #333;border-radius:6px;color:var(--g3);
  font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1px;padding:5px 10px;cursor:pointer}

/* TABS */
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--g2);
  position:sticky;top:52px;z-index:9}
.tab-btn{flex:1;padding:12px 8px;font-family:'Jost',sans-serif;font-size:13px;
  font-weight:500;letter-spacing:.5px;background:none;border:none;cursor:pointer;
  color:var(--g3);border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:var(--black);border-bottom-color:var(--black)}

/* SECTIONS */
.section{padding:18px}
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--g3);
  text-transform:uppercase;margin-bottom:14px}

/* PHOTO */
.photo-area{width:100%;aspect-ratio:4/3;border:2px dashed var(--g2);border-radius:var(--r);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;overflow:hidden;position:relative;background:var(--g1);transition:border-color .2s;
  margin-bottom:10px;cursor:pointer}
.photo-area:hover{border-color:#aaa}
.photo-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.photo-btns{display:flex;gap:8px;margin-bottom:14px}
.photo-btn{flex:1;padding:9px;border:1.5px solid var(--g2);border-radius:8px;
  background:var(--white);font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;transition:border-color .2s}
.photo-btn:hover{border-color:#999}

/* INPUTS */
.text-input{width:100%;padding:12px 14px;font-family:'Jost',sans-serif;font-size:15px;
  border:1.5px solid var(--g2);border-radius:8px;outline:none;background:var(--white);
  color:var(--black);transition:border-color .2s}
.text-input:focus{border-color:var(--black)}
.field-label{font-size:11px;font-weight:600;letter-spacing:1px;color:var(--g4);
  text-transform:uppercase;margin-bottom:8px;display:block}

/* SIZES */
.sizes-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.size-item{display:flex;flex-direction:column;align-items:center;gap:5px}
.size-label{font-size:11px;font-weight:600;letter-spacing:1px;color:var(--g4);text-transform:uppercase}
.qty-control{display:flex;flex-direction:column;align-items:center;gap:3px}
.qty-btn{width:30px;height:26px;border:1.5px solid var(--g2);border-radius:6px;
  background:var(--white);font-size:15px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none}
.qty-btn:active{background:var(--g1);transform:scale(.95)}
.qty-display{width:34px;height:34px;border:1.5px solid var(--g2);border-radius:7px;
  font-family:'Jost',sans-serif;font-size:15px;font-weight:600;text-align:center;
  outline:none;color:var(--black);background:var(--white);transition:border-color .2s}
.qty-display:focus{border-color:var(--black)}

/* BUTTONS */
.save-btn{width:100%;padding:14px;background:var(--black);color:var(--white);
  border:none;border-radius:var(--r);font-family:'Jost',sans-serif;
  font-size:14px;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:opacity .2s;margin-top:4px}
.save-btn:hover{opacity:.85}
.save-btn:disabled{opacity:.4;cursor:not-allowed}

/* STOCK LIST */
.search-input{width:100%;padding:11px 14px;font-family:'Jost',sans-serif;font-size:14px;
  border:1.5px solid var(--g2);border-radius:8px;outline:none;background:var(--white);
  margin-bottom:14px;transition:border-color .2s}
.search-input:focus{border-color:#aaa}
.stock-item{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);
  margin-bottom:12px;overflow:hidden}
.stock-item-header{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer}
.stock-thumb{width:54px;height:54px;border-radius:8px;object-fit:cover;
  background:var(--g1);flex-shrink:0}
.stock-thumb-ph{width:54px;height:54px;border-radius:8px;background:var(--g1);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stock-meta{flex:1;min-width:0}
.stock-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;margin-bottom:3px}
.stock-summary{font-size:11px;color:var(--g3)}
.stock-chevron{font-size:16px;color:var(--g3);transition:transform .2s}
.stock-item.open .stock-chevron{transform:rotate(180deg)}
.stock-sizes{display:none;padding:0 14px 14px;border-top:1px solid var(--g1);padding-top:12px}
.stock-item.open .stock-sizes{display:block}
.stock-actions{display:flex;gap:8px;margin-top:12px}
.update-btn{flex:1;padding:10px;background:var(--black);color:var(--white);
  border:none;border-radius:8px;font-family:'Jost',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
.update-btn:hover{opacity:.8}
.delete-btn{padding:10px 14px;background:none;color:var(--danger);
  border:1.5px solid #fecaca;border-radius:8px;font-family:'Jost',sans-serif;
  font-size:13px;cursor:pointer;transition:all .2s}
.delete-btn:hover{background:#fff5f5}

.empty-state{text-align:center;padding:60px 20px;color:var(--g3)}
.empty-state .ei{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* STATUS */
#upload-status{font-size:12px;color:var(--g3);text-align:center;margin-top:4px;min-height:16px}
.db-status{font-size:11px;color:var(--g3);text-align:center;padding:6px;
  background:var(--g1);border-radius:6px;margin-bottom:12px}
.db-status.ok{color:#16a34a}
.db-status.err{color:var(--danger)}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(--black);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:998;gap:16px;transition:opacity .3s}
#loading-screen.hide{opacity:0;pointer-events:none}
.spinner-big{width:36px;height:36px;border:3px solid #333;border-top-color:var(--white);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--g3);letter-spacing:1px}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--black);color:var(--white);padding:11px 22px;border-radius:100px;
  font-size:13px;font-weight:500;letter-spacing:.5px;opacity:0;transition:all .3s;
  z-index:200;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{background:#16a34a}
#toast.error{background:var(--danger)}

input[type="file"]{display:none}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="logo-big">JCCLUB</div>
  <div class="spinner-big"></div>
  <div class="loading-text">LOADING STOCK…</div>
</div>

<!-- PIN SCREEN -->
<div id="pin-screen" style="display:none">
  <div class="logo-big">JCCLUB</div>
  <div class="sub-text">Stock Manager</div>
  <input type="password" id="pin-input" placeholder="Admin PIN" maxlength="30"
    onkeydown="if(event.key==='Enter') checkPin()" autocomplete="off">
  <div id="pin-error"></div>
  <div class="pin-btn-row">
    <button class="pin-btn-main" onclick="checkPin()">UNLOCK AS ADMIN</button>
    <button class="pin-btn-ghost" onclick="enterAsReseller()">👀 VIEW STOCK ONLY</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <div class="h-logo">JCCLUB</div>
    <div class="h-role" id="role-badge">—</div>
    <button id="lock-btn" onclick="lockApp()">LOCK</button>
  </header>

  <div class="tabs" id="tab-bar">
    <button class="tab-btn active" id="tab-stock-btn" onclick="switchTab('stock')">📦 Stock</button>
    <button class="tab-btn" id="tab-add-btn" onclick="switchTab('add')" style="display:none">＋ Add Item</button>
  </div>

  <!-- STOCK TAB -->
  <div id="tab-stock" class="section">
    <div class="db-status" id="db-status">Connecting…</div>
    <input type="text" class="search-input" id="search-input" placeholder="Search jerseys…" oninput="renderStock()">
    <div id="stock-list"></div>
  </div>

  <!-- ADD TAB (admin only) -->
  <div id="tab-add" class="section" style="display:none">
    <div class="card">
      <div class="card-title">Product Photo</div>
      <div class="photo-area" id="photo-area" onclick="document.getElementById('file-gallery').click()">
        <span style="font-size:32px">🖼️</span>
        <span style="font-size:13px;color:var(--g3)">Tap to choose photo</span>
      </div>
      <div class="photo-btns">
        <button class="photo-btn" onclick="document.getElementById('file-camera').click()">📷 Camera</button>
        <button class="photo-btn" onclick="document.getElementById('file-gallery').click()">🖼️ Gallery</button>
        <button class="photo-btn" id="rm-photo" style="display:none;color:var(--danger);border-color:#fecaca" onclick="removePhoto()">🗑 Remove</button>
      </div>
      <input type="file" id="file-camera" accept="image/*" capture="environment" onchange="handlePhoto(this)">
      <input type="file" id="file-gallery" accept="image/*" onchange="handlePhoto(this)">
      <div id="upload-status"></div>
    </div>

    <div class="card">
      <div class="card-title">Item Name</div>
      <input type="text" class="text-input" id="item-name" placeholder="e.g. Brazil Home Kit 2024">
    </div>

    <div class="card">
      <div class="card-title">Stock by Size</div>
      <div class="sizes-grid" id="add-sizes-grid"></div>
    </div>

    <button class="save-btn" id="save-btn" onclick="saveItem()">SAVE TO STOCK</button>
  </div>
</div>

<div id="toast"></div>

<!-- Firebase SDK (module) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getDatabase, ref, get, set, onValue, remove
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const ADMIN_PIN = 'jcclub916';
const IMGBB_KEY = 'eefc443b08b231582bb6f78e52202294';

const firebaseConfig = {
  apiKey: "AIzaSyC2SBFe8TsvS0W_lM4C0XOqLG4u5N9W-Y8",
  authDomain: "dbspro-d50aa.firebaseapp.com",
  databaseURL: "https://dbspro-d50aa-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dbspro-d50aa",
  storageBucket: "dbspro-d50aa.firebasestorage.app",
  messagingSenderId: "733574579947",
  appId: "1:733574579947:web:58b9d1f59886368910a0ae"
};
// ═══════════════════════════════════════════════

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const SIZES    = ['S','M','L','XL','XXL'];
const ROLE_KEY = 'jcclub_role';

let stock        = [];
let currentRole  = null;
let currentPhoto = null;
let liveUnsubscribe = null; // holds the onValue unsubscribe fn

// ── INIT ────────────────────────────────────────
async function init() {
  const saved = localStorage.getItem(ROLE_KEY);
  if (saved === 'admin' || saved === 'reseller') {
    currentRole = saved;
    await bootApp();
  } else {
    hide('loading-screen');
    show('pin-screen');
  }
}

// ── AUTH ─────────────────────────────────────────
window.checkPin = function() {
  const val = document.getElementById('pin-input').value.trim();
  if (val === ADMIN_PIN) {
    localStorage.setItem(ROLE_KEY, 'admin');
    currentRole = 'admin';
    document.getElementById('pin-input').value = '';
    bootApp();
  } else {
    shake();
    document.getElementById('pin-error').textContent = 'Wrong PIN';
    document.getElementById('pin-input').value = '';
    setTimeout(() => document.getElementById('pin-error').textContent = '', 1500);
  }
}

window.enterAsReseller = function() {
  localStorage.setItem(ROLE_KEY, 'reseller');
  currentRole = 'reseller';
  bootApp();
}

window.lockApp = function() {
  if (liveUnsubscribe) liveUnsubscribe();
  localStorage.removeItem(ROLE_KEY);
  location.reload();
}

function shake() {
  const inp = document.getElementById('pin-input');
  inp.classList.add('error');
  setTimeout(() => inp.classList.remove('error'), 400);
}

// ── BOOT ─────────────────────────────────────────
async function bootApp() {
  show('loading-screen');
  hide('pin-screen');

  const badge = document.getElementById('role-badge');
  if (currentRole === 'admin') {
    badge.textContent = 'ADMIN';
    badge.className = 'h-role admin';
    document.getElementById('tab-add-btn').style.display = '';
  } else {
    badge.textContent = 'RESELLER';
    badge.className = 'h-role reseller';
  }

  await fetchStock();  // initial load

  document.getElementById('loading-screen').classList.add('hide');
  setTimeout(() => hide('loading-screen'), 350);
  show('app');
  buildSizesGrid('add-sizes-grid', {});
  renderStock();

  // live updates — rebuilds list whenever Firebase data changes
  subscribeStock();
}

// ── FIREBASE DB ───────────────────────────────────
async function fetchStock() {
  const status = document.getElementById('db-status');
  try {
    const snap = await get(ref(db, 'stock'));
    stock = snap.exists() ? Object.values(snap.val()) : [];
    // sort newest first (by id which is timestamp)
    stock.sort((a, b) => Number(b.id) - Number(a.id));
    status.textContent = `✅ ${stock.length} items loaded`;
    status.className = 'db-status ok';
  } catch(e) {
    status.textContent = '⚠️ Could not reach Firebase — check config / rules';
    status.className = 'db-status err';
    stock = [];
  }
}

function subscribeStock() {
  // unsubscribe any previous listener
  if (liveUnsubscribe) liveUnsubscribe();

  liveUnsubscribe = onValue(ref(db, 'stock'), snap => {
    stock = snap.exists() ? Object.values(snap.val()) : [];
    stock.sort((a, b) => Number(b.id) - Number(a.id));

    const status = document.getElementById('db-status');
    if (status) {
      status.textContent = `✅ ${stock.length} items · live`;
      status.className = 'db-status ok';
    }
    renderStock();
  }, err => {
    const status = document.getElementById('db-status');
    if (status) {
      status.textContent = '⚠️ Live sync error — check Firebase rules';
      status.className = 'db-status err';
    }
  });
}

// Write a single item node  →  stock/<id>
async function pushItem(item) {
  await set(ref(db, `stock/${item.id}`), item);
}

// Delete a single item node
async function removeItem(id) {
  await remove(ref(db, `stock/${id}`));
}

// ── PHOTO ─────────────────────────────────────────
window.handlePhoto = function(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    currentPhoto = { file, dataUrl: e.target.result };
    const area = document.getElementById('photo-area');
    area.innerHTML = `<img src="${e.target.result}" alt="preview">`;
    document.getElementById('rm-photo').style.display = '';
    document.getElementById('upload-status').textContent = 'Photo ready — uploads on save';
  };
  reader.readAsDataURL(file);
  input.value = '';
}

window.removePhoto = function() {
  currentPhoto = null;
  const area = document.getElementById('photo-area');
  area.innerHTML = `<span style="font-size:32px">🖼️</span><span style="font-size:13px;color:var(--g3)">Tap to choose photo</span>`;
  document.getElementById('rm-photo').style.display = 'none';
  document.getElementById('upload-status').textContent = '';
}

async function uploadImgBB(file) {
  const b64 = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
  const fd = new FormData();
  fd.append('image', b64);
  const res  = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd });
  const data = await res.json();
  if (data?.data?.url) return data.data.url;
  throw new Error(data?.error?.message || 'ImgBB failed');
}

// ── SAVE NEW ITEM ─────────────────────────────────
window.saveItem = async function() {
  if (currentRole !== 'admin') return;
  const name = document.getElementById('item-name').value.trim();
  if (!name) { toast('Enter an item name', 'error'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'SAVING…';

  try {
    let photoUrl = null;
    if (currentPhoto) {
      document.getElementById('upload-status').textContent = '⏳ Uploading photo…';
      photoUrl = await uploadImgBB(currentPhoto.file);
      document.getElementById('upload-status').textContent = '✅ Photo uploaded';
    }

    const item = {
      id: Date.now().toString(),
      name,
      photo: photoUrl,
      sizes: getSizesFromGrid('add-sizes-grid'),
      updatedAt: new Date().toLocaleDateString('en-IN')
    };

    await pushItem(item);  // write only this item node
    resetForm();
    toast('Item saved!', 'success');
    switchTab('stock');
    // renderStock is called automatically by onValue listener
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  }

  btn.disabled = false; btn.textContent = 'SAVE TO STOCK';
}

// ── SIZES GRID ────────────────────────────────────
window.buildSizesGrid = function(id, values) {
  const grid = document.getElementById(id);
  if (!grid) return;
  const isReadonly = currentRole === 'reseller';
  grid.innerHTML = SIZES.map(s => `
    <div class="size-item">
      <div class="size-label">${s}</div>
      <div class="qty-control">
        ${!isReadonly ? `<button class="qty-btn" onclick="changeQty('${id}','${s}',1)">+</button>` : ''}
        <input class="qty-display" id="qty-${id}-${s}" type="number"
          value="${values[s] ?? 0}" min="0" max="999"
          ${isReadonly ? 'readonly style="border-color:var(--g2);cursor:default;font-size:14px"' : ''}
          oninput="clampQty(this)" onblur="if(this.value==='')this.value=0">
        ${!isReadonly ? `<button class="qty-btn" onclick="changeQty('${id}','${s}',-1)">−</button>` : ''}
      </div>
    </div>`).join('');
}

window.changeQty = function(gridId, size, delta) {
  const inp = document.getElementById(`qty-${gridId}-${size}`);
  let v = parseInt(inp.value) || 0;
  inp.value = Math.max(0, Math.min(999, v + delta));
}

window.clampQty = function(inp) {
  let v = parseInt(inp.value);
  if (isNaN(v) || v < 0) inp.value = 0;
  else if (v > 999) inp.value = 999;
}

function getSizesFromGrid(gridId) {
  const out = {};
  SIZES.forEach(s => { out[s] = parseInt(document.getElementById(`qty-${gridId}-${s}`)?.value) || 0; });
  return out;
}

function resetForm() {
  document.getElementById('item-name').value = '';
  removePhoto();
  buildSizesGrid('add-sizes-grid', {});
  document.getElementById('upload-status').textContent = '';
}

// ── STOCK LIST ────────────────────────────────────
window.renderStock = function() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  const list = document.getElementById('stock-list');
  if (!list) return;
  const filtered = stock.filter(it => it.name.toLowerCase().includes(q));

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="ei">📦</div>
      <p>${q ? 'No items match your search' : 'No items yet.'}</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(item => `
    <div class="stock-item" id="si-${item.id}">
      <div class="stock-item-header" onclick="toggleItem('${item.id}')">
        ${item.photo
          ? `<img class="stock-thumb" src="${item.photo}" alt="">`
          : `<div class="stock-thumb-ph">👕</div>`}
        <div class="stock-meta">
          <div class="stock-name">${esc(item.name)}</div>
          <div class="stock-summary">${sizeSummary(item.sizes)} · ${item.updatedAt||''}</div>
        </div>
        <div class="stock-chevron">⌄</div>
      </div>
      <div class="stock-sizes">
        <div class="sizes-grid" id="eg-${item.id}"></div>
        ${currentRole === 'admin' ? `
        <div class="stock-actions">
          <button class="update-btn" onclick="updateItem('${item.id}')">UPDATE STOCK</button>
          <button class="delete-btn" onclick="deleteItem('${item.id}')">Delete</button>
        </div>` : ''}
      </div>
    </div>`).join('');

  filtered.forEach(item => buildSizesGrid(`eg-${item.id}`, item.sizes));
}

window.toggleItem = function(id) {
  document.getElementById(`si-${id}`)?.classList.toggle('open');
}

window.updateItem = async function(id) {
  if (currentRole !== 'admin') return;
  const item = stock.find(it => it.id === id);
  if (!item) return;
  const btn = document.querySelector(`#si-${id} .update-btn`);
  if (btn) { btn.disabled = true; btn.textContent = 'SAVING…'; }
  try {
    item.sizes = getSizesFromGrid(`eg-${id}`);
    item.updatedAt = new Date().toLocaleDateString('en-IN');
    await pushItem(item);  // write only this item node
    toast('Stock updated!', 'success');
    // onValue listener will re-render; re-open the card
    setTimeout(() => document.getElementById(`si-${id}`)?.classList.add('open'), 200);
  } catch(e) {
    toast('Save failed: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'UPDATE STOCK'; }
  }
}

window.deleteItem = async function(id) {
  if (!confirm('Delete this item?')) return;
  try {
    await removeItem(id);
    toast('Deleted');
    // onValue listener will re-render automatically
  } catch(e) {
    toast('Delete failed', 'error');
  }
}

function sizeSummary(sizes) {
  return SIZES.map(s => `${s}:${sizes[s]??0}`).join(' · ');
}

// ── TABS ──────────────────────────────────────────
window.switchTab = function(tab) {
  ['stock','add'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t===tab ? '' : 'none';
    document.getElementById(`tab-${t}-btn`)?.classList.toggle('active', t===tab);
  });
  if (tab === 'stock') renderStock();
}

// ── UTILS ─────────────────────────────────────────
function show(id) { const el = document.getElementById(id); if(el) el.style.display = ''; }
function hide(id) { const el = document.getElementById(id); if(el) el.style.display = 'none'; }
function esc(s)   { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let toastTimer;
window.toast = function(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 2500);
}

init();
</script>
</body>
</html>
